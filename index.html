<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karthik & Ravali Wedding</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<script defer src="script.js"></script>

</head>

<body>

<!-- MUSIC -->

<audio id="bgMusic" loop>

<source src="music.mp3" type="audio/mp3">

</audio>

<button id="musicBtn">

🔊 Play Music

</button>

<!-- HERO -->

<section class="hero">

<div class="overlay">

<h3 id="guestName"></h3>

<h1 class="couple">

Karthik  
<span>&</span>  
Ravali

</h1>

<p class="invite-text">

Together with their families  
invite you to celebrate  
their wedding

</p>

<div id="countdown"></div>

</div>

</section>

<!-- EVENTS -->

<section class="events">

<h2 class="section-title">

Wedding Events

</h2>

<div class="event-container">

<div class="event-card">

<h3>Groom Making</h3>

<p>📅 19 April 2026</p>

<p>⏰ 10:00 AM</p>

</div>

<div class="event-card">

<h3>Sangeeth</h3>

<p>📅 25 April 2026</p>

<p>⏰ 5:00 PM</p>

</div>

<div class="event-card highlight">

<h3>Marriage</h3>

<p>📅 26 April 2026</p>

<p>⏰ 7:48 AM</p>

</div>

<div class="event-card">

<h3>Reception</h3>

<p>📅 26 April 2026</p>

<p>⏰ 12:00 PM</p>

</div>

</div>

</section>

<!-- GALLERY -->

<section class="gallery">

<h2 class="section-title">

Gallery

</h2>

<div class="gallery-container">

<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img4.jpg">
<img src="img5.jpg">
<img src="img6.jpg">

</div>

</section>

</body>

</html>
